<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joe Markland — Career Coaching for People Who Feel Stuck</title>
  <meta
    name="description"
    content="Career coaching for capable people who already know what they should be doing, but still are not doing it. Start with the free GAP Profile. No sign-up. About 4 minutes."
  />
  <meta property="og:title" content="Joe Markland — Career Coaching for People Who Feel Stuck" />
  <meta
    property="og:description"
    content="You probably already know the move. The problem is that something keeps getting in the way. Start with the free GAP Profile."
  />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#1A1F3D" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap"
    rel="stylesheet"
  />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: #f5f0e8;
      color: #2c2a25;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img { max-width: 100%; display: block; }
    a { color: #2a9d8f; text-underline-offset: 2px; }
    h1, h2, h3, h4 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-weight: 400;
      margin: 0;
      letter-spacing: -0.015em;
    }
    p { margin: 0; }
    button, input, textarea, select { font: inherit; }
    *:focus-visible {
      outline: 2px solid #2a9d8f;
      outline-offset: 3px;
      border-radius: 6px;
    }
    ::selection { background: rgba(42,157,143,.16); }

    :root {
      --sand: #f5f0e8;
      --sand-2: #faf7f2;
      --sand-3: #ebe4d8;
      --cream: #fefbf4;
      --ink: #2c2a25;
      --mid: #5c5850;
      --light: #6e6960;
      --navy: #1a1f3d;
      --teal: #2a9d8f;
      --amber: #e9a319;
      --amber-hover: #d08a10;
      --deep-blue: #1b6b8a;
      --shadow: 0 10px 30px rgba(26,31,61,.08);
      --max: 1120px;
      --content: 720px;
      --tap: 46px;
    }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .narrow {
      width: min(var(--content), 100%);
      margin: 0 auto;
    }

    .section { padding: 72px 0; }
    .section-tight { padding: 54px 0; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: .78rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--teal);
      font-weight: 700;
      margin-bottom: 14px;
    }

    .eyebrow::before {
      content: "";
      width: 18px;
      height: 1px;
      background: rgba(42,157,143,.5);
      display: inline-block;
    }

    .section-title {
      font-size: clamp(1.9rem, 4vw, 3rem);
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 16px;
    }

    .section-intro {
      font-size: 1.04rem;
      line-height: 1.7;
      color: var(--mid);
      max-width: 650px;
    }

    .divider {
      border: 0;
      border-top: 1px solid var(--sand-3);
      margin: 0;
    }

    .btn {
      min-height: var(--tap);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      border-radius: 999px;
      text-decoration: none;
      transition: transform .16s ease, background .2s ease, border-color .2s ease, color .2s ease, box-shadow .2s ease;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: var(--amber);
      color: var(--ink);
      box-shadow: 0 6px 18px rgba(233,163,25,.22);
    }
    .btn-primary:hover {
      background: var(--amber-hover);
      color: var(--ink);
    }

    .btn-secondary {
      border: 1px solid rgba(44,42,37,.14);
      color: var(--ink);
      background: rgba(255,255,255,.42);
      backdrop-filter: blur(4px);
    }
    .btn-secondary:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: rgba(255,255,255,.75);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(26,31,61,.92);
      border-bottom: 1px solid rgba(245,240,232,.06);
    }

    .nav {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      color: rgba(245,240,232,.94);
      text-decoration: none;
      display: inline-flex;
      align-items: baseline;
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.24rem;
      line-height: 1;
    }

    .brand .dot { color: var(--teal); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link {
      color: rgba(245,240,232,.68);
      text-decoration: none;
      font-size: .92rem;
      font-weight: 500;
      transition: color .2s ease;
      min-height: var(--tap);
      display: inline-flex;
      align-items: center;
    }

    .nav-link:hover,
    .nav-link.active {
      color: rgba(245,240,232,.98);
    }

    .hero {
      position: relative;
      overflow: clip;
      padding: 74px 0 26px;
      background:
        radial-gradient(circle at top right, rgba(42,157,143,.11), transparent 32%),
        radial-gradient(circle at 0% 20%, rgba(26,31,61,.05), transparent 24%),
        linear-gradient(to bottom, #f8f4ed 0%, #f5f0e8 100%);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.12fr) minmax(320px, .88fr);
      gap: 34px;
      align-items: start;
    }

    .hero-copy { max-width: 690px; }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(26,31,61,.05);
      color: var(--navy);
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .04em;
      margin-bottom: 18px;
    }

    .hero-title {
      font-size: clamp(2.55rem, 6vw, 5rem);
      line-height: .98;
      color: var(--ink);
      margin-bottom: 18px;
      max-width: 12ch;
    }

    .hero-title .accent {
      color: var(--teal);
      font-style: italic;
    }

    .hero-sub {
      font-size: clamp(1.02rem, 2vw, 1.16rem);
      line-height: 1.72;
      color: var(--mid);
      max-width: 58ch;
      margin-bottom: 22px;
    }

    .hero-proof-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.7);
      border: 1px solid rgba(44,42,37,.08);
      color: var(--ink);
      font-size: .86rem;
      font-weight: 600;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .hero-risk {
      color: var(--light);
      font-size: .86rem;
      line-height: 1.6;
    }

    .hero-card {
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(44,42,37,.08);
      box-shadow: var(--shadow);
      border-radius: 24px;
      overflow: hidden;
    }

    .hero-card-top { padding: 18px 18px 0; }
    .hero-card-body { padding: 18px; }

    .hero-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .hero-badge {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--teal);
      font-weight: 700;
    }

    .score-chip {
      min-height: 32px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(42,157,143,.1);
      color: var(--teal);
      font-size: .78rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
    }

    .pattern-item {
      padding: 16px;
      border-radius: 14px;
      border: 1px solid rgba(44,42,37,.08);
      background: linear-gradient(180deg, rgba(42,157,143,.08), rgba(255,255,255,.95));
    }

    .pattern-k {
      display: block;
      color: var(--light);
      font-size: .73rem;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 700;
    }

    .pattern-name {
      display: block;
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.22rem;
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .pattern-desc {
      color: var(--mid);
      font-size: .92rem;
      line-height: 1.55;
    }

    .card-note {
      padding: 14px 18px 18px;
      border-top: 1px solid rgba(44,42,37,.08);
      background: rgba(26,31,61,.03);
      color: var(--mid);
      font-size: .88rem;
      line-height: 1.6;
    }

    .proof-strip { padding: 12px 0 0; }

    .proof-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .proof-box {
      min-height: 94px;
      background: rgba(255,255,255,.64);
      border: 1px solid rgba(44,42,37,.08);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(26,31,61,.04);
    }

    .proof-box strong {
      display: block;
      font-size: 1.06rem;
      color: var(--navy);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .proof-box span {
      color: var(--mid);
      font-size: .9rem;
      line-height: 1.55;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 26px;
    }

    .step-card, .trust-card, .offer-card, .faq-card, .quote-card, .about-photo-card {
      background: rgba(255,255,255,.65);
      border: 1px solid rgba(44,42,37,.08);
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(26,31,61,.04);
    }

    .step-card { padding: 22px; }

    .step-num {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(26,31,61,.07);
      color: var(--navy);
      font-size: .88rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .step-title {
      font-size: 1.42rem;
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .step-copy {
      color: var(--mid);
      font-size: .97rem;
      line-height: 1.68;
    }

    .highlight-panel {
      padding: 24px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(26,31,61,.98), rgba(26,31,61,.92));
      color: #f5f0e8;
      box-shadow: var(--shadow);
    }

    .highlight-panel h3 {
      font-size: 1.7rem;
      line-height: 1.08;
      margin-bottom: 12px;
      color: #f5f0e8;
    }

    .highlight-panel p {
      color: rgba(245,240,232,.75);
      line-height: 1.72;
      font-size: .98rem;
    }

    .quote-line {
      margin: 22px 0 0;
      padding-left: 18px;
      border-left: 3px solid var(--teal);
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.38rem;
      line-height: 1.42;
      color: #fff8ee;
      font-style: italic;
    }

    .text-block {
      display: grid;
      gap: 16px;
      max-width: 680px;
    }

    .text-block p {
      color: var(--mid);
      font-size: 1rem;
      line-height: 1.78;
    }

    .text-block p.stronger {
      color: var(--ink);
      font-weight: 500;
    }

    .trust-layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 20px;
      margin-top: 28px;
      align-items: start;
    }

    .photo-card-inner {
      padding: 18px;
    }

    .coach-photo {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 16px;
      background: #ddd;
      margin-bottom: 14px;
    }

    .photo-caption {
      color: var(--mid);
      font-size: .92rem;
      line-height: 1.65;
    }

    .photo-caption strong {
      display: block;
      color: var(--ink);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .trust-card { padding: 24px; }

    .trust-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .trust-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      color: var(--mid);
      font-size: .96rem;
      line-height: 1.65;
    }

    .trust-item strong {
      color: var(--ink);
      font-weight: 700;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--teal);
      flex-shrink: 0;
      margin-top: .55em;
    }

    .quote-stack {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .quote-card { padding: 22px; }

    .quote-card blockquote {
      margin: 0 0 14px;
      color: var(--ink);
      font-size: 1rem;
      line-height: 1.75;
    }

    .quote-card cite {
      font-style: normal;
      color: var(--light);
      font-size: .84rem;
    }

    .offer-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 28px;
    }

    .offer-card {
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .offer-card.primary {
      border-color: rgba(233,163,25,.3);
      box-shadow: 0 10px 28px rgba(233,163,25,.12);
    }

    .offer-card.featured::after {
      content: "Best place to start";
      position: absolute;
      top: 14px;
      right: 14px;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(233,163,25,.16);
      color: #8a5b00;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .04em;
      display: inline-flex;
      align-items: center;
    }

    .offer-tier {
      color: var(--light);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .offer-title {
      font-size: 1.6rem;
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .offer-price {
      font-size: 1rem;
      color: var(--navy);
      font-weight: 700;
      margin-bottom: 14px;
    }

    .offer-copy {
      color: var(--mid);
      font-size: .95rem;
      line-height: 1.68;
      margin-bottom: 18px;
    }

    .offer-points {
      display: grid;
      gap: 10px;
      margin-bottom: 22px;
    }

    .offer-points span {
      color: var(--ink);
      font-size: .9rem;
      line-height: 1.5;
      position: relative;
      padding-left: 18px;
    }

    .offer-points span::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--teal);
      position: absolute;
      top: .55em;
      left: 0;
      transform: translateY(-50%);
    }

    .faq-wrap {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    .faq-card { overflow: hidden; }

    .faq-btn {
      width: 100%;
      min-height: var(--tap);
      padding: 18px 20px;
      background: transparent;
      border: 0;
      text-align: left;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      cursor: pointer;
      color: var(--ink);
      font-weight: 700;
      font-size: .96rem;
      line-height: 1.5;
    }

    .faq-btn:hover { color: var(--teal); }

    .faq-icon {
      font-size: 1.2rem;
      line-height: 1;
      color: var(--teal);
      flex-shrink: 0;
      transition: transform .2s ease;
    }

    .faq-panel {
      overflow: hidden;
      transition: max-height .28s ease, opacity .2s ease;
      max-height: 0;
      opacity: 0;
    }

    .faq-panel.open {
      max-height: 240px;
      opacity: 1;
    }

    .faq-inner {
      padding: 0 20px 18px;
      color: var(--mid);
      font-size: .95rem;
      line-height: 1.75;
    }

    .cta-band {
      padding: 34px;
      border-radius: 24px;
      background:
        radial-gradient(circle at top right, rgba(42,157,143,.12), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,.8), rgba(255,255,255,.62));
      border: 1px solid rgba(44,42,37,.08);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .cta-band h2 {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.03;
      margin-bottom: 14px;
      color: var(--ink);
    }

    .cta-band p {
      max-width: 650px;
      margin: 0 auto 22px;
      color: var(--mid);
      font-size: 1rem;
      line-height: 1.72;
    }

    .footer {
      background: var(--navy);
      color: rgba(245,240,232,.7);
      padding: 42px 0 28px;
      margin-top: 80px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr .8fr;
      gap: 22px;
      align-items: start;
    }

    .footer-brand {
      color: rgba(245,240,232,.95);
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.18rem;
      margin-bottom: 8px;
    }

    .footer-copy {
      color: rgba(245,240,232,.56);
      font-size: .9rem;
      line-height: 1.7;
      max-width: 38ch;
    }

    .footer-title {
      color: rgba(245,240,232,.95);
      font-size: .84rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .footer-links {
      display: grid;
      gap: 10px;
    }

    .footer-links a {
      color: rgba(245,240,232,.58);
      text-decoration: none;
      font-size: .9rem;
      transition: color .2s ease;
      min-height: var(--tap);
      display: inline-flex;
      align-items: center;
    }

    .footer-links a:hover {
      color: var(--teal);
    }

    .footer-meta {
      margin-top: 26px;
      padding-top: 18px;
      border-top: 1px solid rgba(245,240,232,.08);
      color: rgba(245,240,232,.28);
      font-size: .76rem;
      line-height: 1.6;
    }

    .about-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 28px;
      align-items: start;
    }

    .about-photo-card { overflow: hidden; }
    .about-photo-card img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
    }
    .about-photo-meta {
      padding: 16px 18px 18px;
      color: var(--mid);
      font-size: .92rem;
      line-height: 1.65;
    }

    .skip-link {
      position: absolute;
      left: -999px;
      top: 8px;
      z-index: 999;
      background: #fff;
      color: #000;
      padding: 10px 14px;
      border-radius: 8px;
    }
    .skip-link:focus { left: 8px; }

    @media (max-width: 980px) {
      .hero-grid,
      .trust-layout,
      .about-layout,
      .footer-grid {
        grid-template-columns: 1fr;
      }

      .feature-grid,
      .offer-grid,
      .proof-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero-title { max-width: 13ch; }
    }

    @media (max-width: 720px) {
      .section { padding: 58px 0; }
      .section-tight { padding: 44px 0; }

      .nav {
        min-height: auto;
        padding: 14px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .nav-links {
        width: 100%;
        justify-content: flex-start;
        gap: 14px;
      }

      .hero { padding-top: 42px; }

      .hero-title {
        font-size: clamp(2.2rem, 10vw, 3.5rem);
      }

      .feature-grid,
      .offer-grid,
      .proof-row {
        grid-template-columns: 1fr;
      }

      .cta-band { padding: 24px 18px; }

      .hero-actions { align-items: stretch; }
      .hero-actions .btn { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>

          const observer = new IntersectionObserver(function (entries) {
            if (entries[0].isIntersecting) {
              setVisible(true);
              observer.disconnect();
            }
          }, { threshold: 0.12 });

          observer.observe(el);
          return function () { observer.disconnect(); };
        }, [reduce]);

          ref,
          style: Object.assign({
            opacity: visible ? 1 : 0,
            transform: visible ? 'translateY(0)' : 'translateY(14px)',

                      flexWrap: 'wrap'
                    }
                  },
                    e('a', { href: GAP, className: 'btn btn-primary' }, 'Take the free GAP Profile'),
                    e('a', { href: SESSION, className: 'btn btn-secondary' }, 'Ask about a 1:1 session')
                  )
                )
              )
            )
          )
        );
      }

      function ParentsPage() {
        return e('main', { id: 'main' },
          e('section', { className: 'section' },
            e('div', { className: 'container narrow' },
              e(FadeIn, null,
                e('div', { className: 'eyebrow' }, 'For parents and supporters'),
                e('h1', { className: 'section-title' }, 'If someone you care about seems stuck, you are probably not imagining it'),
                e('div', { className: 'text-block', style: { marginTop: '22px' } },
                  e('p', { className: 'stronger' },
                    'Telling them to just get on with it usually does not help.'
                  ),
                  e('p', null,
                    'The problem is often not motivation. It is that something more specific is getting in the way — self-doubt, fear of getting it wrong, a move that does not yet feel like them, or simply not having the capacity to carry it through.'
                  ),
                  e('p', null,
                    'The GAP Profile gives them something more concrete to look at than another conversation that goes in circles.'
                  )
                )
              )
            )
          ),
          e('section', { className: 'section-tight' },
            e('div', { className: 'container' },
              e(FadeIn, null,
                e('div', { className: 'highlight-panel' },
                  e('h3', null, 'A more useful starting point'),
                  e('p', null,
                    'The best place to start is usually the GAP Profile, not another push.'
                  ),
                  e('div', { className: 'quote-line' },
                    'If you want to ask whether coaching might help, email me and I will tell you honestly what seems useful.'
                  )
                )
              ),
              e(FadeIn, { delay: 0.06, style: { marginTop: '18px' } },
                e('div', { className: 'cta-band' },
                  e('h2', null, 'Start here'),
                  e('p', null,
                    'Send them the GAP Profile and let them take it in their own time. It is free, there is no sign-up, and it gives them a more structured way to understand what may be going on.'
                  ),
                  e('div', {
                    style: {
                      display: 'flex',
                      gap: '12px',
                      justifyContent: 'center',
                      flexWrap: 'wrap'
                    }
                  },
                    e('a', { href: GAP, className: 'btn btn-primary' }, 'Take the free GAP Profile'),
                    e('a', { href: EMAIL, className: 'btn btn-secondary' }, 'Email Joe')
                  )
                )
              )
            )
          )
        );
      }

      function Footer(props) {
        function navClick(ev, page) {
          ev.preventDefault();
          props.setPage(page);
          window.scrollTo(0, 0);
        }

        return e('footer', { className: 'footer' },
          e('div', { className: 'container' },
            e('div', { className: 'footer-grid' },
              e('div', null,
                e('div', { className: 'footer-brand' }, 'Joe Markland'),
                e('p', { className: 'footer-copy' },
                  'Career coaching for people who know the move but still are not making it. Start with the GAP Profile.'
                )
              ),
              e('div', null,
                e('div', { className: 'footer-title' }, 'Explore'),
                e('div', { className: 'footer-links' },
                  e('a', { href: '#/', onClick: function (ev) { navClick(ev, 'home'); } }, 'Home'),
                  e('a', { href: '#/about', onClick: function (ev) { navClick(ev, 'about'); } }, 'About'),
                  e('a', { href: '#/parents', onClick: function (ev) { navClick(ev, 'parents'); } }, 'For parents'),
                  e('a', { href: GAP }, 'Take the GAP Profile')
                )
              ),
              e('div', null,
                e('div', { className: 'footer-title' }, 'Contact'),
                e('div', { className: 'footer-links' },
                  e('a', { href: EMAIL }, 'hello@joemarkland.co.uk'),
                  e('a', { href: LINKEDIN, target: '_blank', rel: 'noopener noreferrer' }, 'LinkedIn'),
                  e('a', { href: SESSION }, 'Ask about a 1:1 session'),
                  e('a', { href: PACKAGE }, 'Ask about coaching + DISC')
                )
              )
            ),
            e('div', { className: 'footer-meta' },
              '© 2026 Joe Markland Career Coaching. GAP Profile™ is a trademark. Based in Chorley, Lancashire. Sessions on Zoom and face-to-face locally.'
            )
          )
        );
      }

      function App() {
        const pageState = useState(function () {
          const hash = window.location.hash.slice(1);
          if (hash === '/about') return 'about';
          if (hash === '/parents') return 'parents';
          return 'home';
        });

        const page = pageState[0];
        const setPage = pageState[1];

        useEffect(function () {
          function handler() {
            const hash = window.location.hash.slice(1);
            if (hash === '/about') setPage('about');
            else if (hash === '/parents') setPage('parents');
            else setPage('home');
          }
          window.addEventListener('hashchange', handler);
          return function () { window.removeEventListener('hashchange', handler); };
        }, []);

        useEffect(function () {
          const nextHash = page === 'about' ? '#/about' : page === 'parents' ? '#/parents' : '#/';
          if (window.location.hash !== nextHash) {
            window.location.hash = nextHash;
          }
        }, [page]);

        return e(React.Fragment, null,
          e(Header, { page, setPage }),
          page === 'about'
            ? e(AboutPage)
            : page === 'parents'
              ? e(ParentsPage)
              : e(HomePage, { setPage }),
          e(Footer, { setPage })
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(e(App));
    })();
  </script>
</body>
</html>
