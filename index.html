    function FadeIn(props) {
      var ref = useRef(null);
      var state = useState(false);
      var vis = state[0], setVis = state[1];
      var delay = props.delay || 0;

      useEffect(function() {
        var el = ref.current;
        if (!el) return;
        var obs = new IntersectionObserver(function(entries) {
          if (entries[0].isIntersecting) {
            setVis(true);
            obs.disconnect();
          }
        }, { threshold: 0.12 });
        obs.observe(el);
        return function() { obs.disconnect(); };
      }, []);

      return e('div', {
        ref: ref,
        style: Object.assign({
          opacity: vis ? 1 : 0,
          transform: vis ? 'translateY(0)' : 'translateY(16px)',

    function ParentsPage() {
      return e('main', null,
        e('section', { style: Object.assign({}, w, { paddingTop: 52, paddingBottom: 44 }) },
          e(FadeIn, null,
            e('h1', {
              style: {
                fontFamily: F.serif,
                fontSize: 'clamp(2.1rem, 5.2vw, 2.9rem)',
                fontWeight: 400,
                color: C.ink,
                lineHeight: 1.1,
                letterSpacing: '-0.02em',
                marginBottom: 16
              }
            }, 'For parents and supporters')
          ),
          e(FadeIn, { delay: 0.08 },
            e('p', {
              style: {
                fontFamily: F.sans,
                fontSize: 'clamp(1rem, 2.3vw, 1.12rem)',
                lineHeight: 1.6,
                color: C.light,
                maxWidth: 540
              }
            }, 'If someone you care about seems stuck, you are probably not imagining it. And telling them to just get on with it is usually not helping.')
          )
        ),

        e('div', { style: w },
          e('div', { style: { height: 1, background: 'linear-gradient(to right, ' + C.ink + '15, ' + C.ink + '08)' } })
        ),

        e('section', { style: Object.assign({}, w, { paddingTop: 44, paddingBottom: 20 }) },
          e(FadeIn, null,
            e('p', { style: pInk }, 'I offer career coaching for people who know roughly what they should be doing next, but still are not making it happen. The problem usually is not motivation. It is that something specific is getting in the way.')
          ),
          e(FadeIn, { delay: 0.05 },
            e('p', { style: ps }, 'That might be self-doubt, fear of getting it wrong, a move that does not quite feel like them yet, or simply not having the time, energy, or headspace to follow things through.')
          ),

            e('p', { style: ps }, 'The GAP Profile gives them something concrete to look at instead of another conversation that goes in circles. It is free, it takes about four minutes, and there is no sign-up.')
          ),
          e(FadeIn, { delay: 0.1 },
            e('p', { style: pInk }, 'If the results feel accurate, they can leave it there, work through it themselves, or book a session with me.')
          )
        ),

        e('section', { style: Object.assign({}, w, { paddingTop: 8, paddingBottom: 40 }) },
          e(FadeIn, null,
            e('div', { style: { borderLeft: '3px solid ' + C.teal, paddingLeft: 24 } },
              e('p', {
                style: {
                  fontFamily: F.serif,
                  fontStyle: 'italic',
                  fontSize: 'clamp(1.15rem, 2.8vw, 1.35rem)',
                  lineHeight: 1.5,
                  color: C.ink,
                  margin: 0
                }
              }, 'The best place to start is usually the GAP Profile, not another push.')
            )
          )
        ),

        e('section', { style: Object.assign({}, w, { paddingTop: 0, paddingBottom: 80 }) },
          e(FadeIn, null,
            e('div', {
              style: {
                background: C.cream,
                border: '1px solid rgba(44,42,37,0.08)',
                borderRadius: 10,
                padding: '32px 28px'
              }
            },
              e('p', {
                style: {

                  fontSize: 'clamp(1.15rem, 2.8vw, 1.35rem)',

                }
              }, 'Start here'),
              e('p', {

                })
              }, 'You can send them the GAP Profile and let them look at it in their own time. If you want to ask whether coaching might help, email me and I will tell you honestly what seems useful.'),

                }, 'Take the free GAP Profile'),

                }, 'Email Joe')

            )

        )
      );

    function App() {
      var pageState = useState(function() {
        var h = window.location.hash.slice(1);
        if (h === '/about') return 'about';
        if (h === '/parents') return 'parents';
        return 'home';
      });
      var page = pageState[0], setPage = pageState[1];

      useEffect(function() {
        var handler = function() {
          var h = window.location.hash.slice(1);
          if (h === '/about') setPage('about');
          else if (h === '/parents') setPage('parents');
          else setPage('home');
        };
        window.addEventListener('hashchange', handler);
        return function() { window.removeEventListener('hashchange', handler); };
      }, []);

      useEffect(function() {
        if (page === 'about') window.location.hash = '/about';
        else if (page === 'parents') window.location.hash = '/parents';
        else window.location.hash = '/';
      }, [page]);

      return e('div', {
        style: {
          fontFamily: F.sans,
          color: C.ink,
          background: C.sand,
          lineHeight: 1.78,
          minHeight: '100vh'
        }
      },
        e(Nav, { page: page, setPage: setPage }),
        page === 'about'
          ? e(AboutPage)
          : page === 'parents'
            ? e(ParentsPage)
            : e(HomePage, { setPage: setPage }),
        e(Footer, { setPage: setPage })
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  })();
  </script>
